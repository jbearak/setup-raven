name: Setup Raven
description: Install the Raven CLI from prebuilt GitHub Release binaries.

inputs:
  version:
    description: Raven version to install. Use "latest" or a release tag.
    required: false
    default: latest

runs:
  using: composite
  steps:
    - name: Install Raven
      shell: bash
      env:
        RAVEN_VERSION: ${{ inputs.version }}
        RAVEN_RELEASE_REPOSITORY: jbearak/raven
      run: bash "$GITHUB_ACTION_PATH/setup-raven.sh"
