name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  install:
    name: Install on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: ./
        with:
          version: latest

      - run: raven --version

  install-pinned:
    name: Install pinned tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Exercises the pinned-tag URL branch (releases/download/<tag>) rather than
      # releases/latest/download. Uses a known-good published tag.
      - uses: ./
        with:
          version: v0.11.1

      - run: raven --version
